services:
  pi-dashboard:
    image: ${IMAGE:-ghcr.io/javidahmed64592/pi-dashboard:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pi-dashboard
    ports:
      - "${PORT:-443}:${PORT:-443}"
    environment:
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-443}
      - API_TOKEN_HASH=${API_TOKEN_HASH:-}
      - HOST_ROOT=/host
    volumes:
      - ./.env:/app/.env
      - ./certs:/app/certs
      - ./logs:/app/logs
      - ./data:/app/data
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro
      # Mount Docker socket for container management
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "python -c \"import urllib.request;
            urllib.request.urlopen('https://localhost:$PORT/api/health',
            context=__import__('ssl')._create_unverified_context()).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
